<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Notion Quick Post</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="container">
      <h1>Notion Quick Post</h1>

      <div id="token-warning" class="token-warning" hidden>
        <p>Notion Integration Token が未設定です。</p>
        <button id="open-options-inline" type="button">設定を開く</button>
      </div>

      <div class="row">
        <button id="open-options" type="button">設定を開く</button>
        <button id="load-db" type="button">DB一覧を取得</button>
      </div>

      <label for="database-select">Database</label>
      <select id="database-select">
        <option value="">先に「DB一覧を取得」を押してください</option>
      </select>

      <label for="title">タイトル</label>
      <input id="title" type="text" placeholder="ページタイトル" />

      <label for="body">本文</label>
      <textarea id="body" rows="6" placeholder="本文を入力"></textarea>

      <button id="create-page" class="primary" type="button">Notionに追加</button>

      <p id="status" class="status" aria-live="polite"></p>

      <details>
        <summary>使い方（初回）</summary>
        <ol>
          <li>NotionでIntegrationを作成しトークンを発行</li>
          <li>対象DatabaseにIntegrationを招待（Share）</li>
          <li>設定画面でトークンを保存→DB一覧取得</li>
        </ol>
      </details>
    </main>

    <script src="popup.js" type="module"></script>
  </body>
</html>
